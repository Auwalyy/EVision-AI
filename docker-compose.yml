version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: evision_mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: evision_ai

  backend:
    build: ./backend
    container_name: evision_backend
    ports:
      - '5000:5000'
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/evision_ai
      CORS_ORIGIN: http://localhost:5173
      AWS_REGION: us-east-1
      AWS_S3_BUCKET: evision-ai-data-lake
    depends_on:
      - mongo
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: evision_frontend
    ports:
      - '80:80'
    depends_on:
      - backend

volumes:
  mongo_data:
